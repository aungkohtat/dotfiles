[metadata]
name = "git-diff"
description = "A channel to select files from git diff commands"
requirements = ["git"]

[source]
command = "git diff --name-only HEAD"

[preview]
command = "git diff HEAD --color=always -- '{}'"

[ui]
layout = "portrait"

[keybindings]
ctrl-s = "actions:stage"
ctrl-r = "actions:restore"
ctrl-e = "actions:edit"

[actions.stage]
command = "git add '{}'"
mode = "fork"

[actions.restore]
command = "git restore '{}'"
mode = "fork"

[actions.edit]
command = "${EDITOR:-vim} '{}'"
shell = "bash"
mode = "execute"
